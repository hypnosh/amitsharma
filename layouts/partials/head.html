<head>

<meta charset="utf-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1">

<title>
{{ if .IsHome }}
{{ .Site.Title }}
{{ else }}
{{ .Title }} · {{ .Site.Title }}
{{ end }}
</title>

<meta
    name="description"
    content="{{ .Site.Params.description }}">

{{ with .Site.Params.analytics.gtm }}
<!-- Google Tag Manager -->
<script>
(function(w,d,s,l,i){
    w[l]=w[l]||[];
    w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});
    var f=d.getElementsByTagName(s)[0],
        j=d.createElement(s),
        dl=l!='dataLayer'?'&l='+l:'';
    j.async=true;
    j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;
    f.parentNode.insertBefore(j,f);
})(window,document,'script','dataLayer','{{ . }}');
</script>
<!-- End Google Tag Manager -->
{{ end }}

{{ $style := resources.Get "css/styles.css" | resources.Minify | fingerprint }}

<link
    rel="stylesheet"
    href="{{ $style.RelPermalink }}">

</head>
