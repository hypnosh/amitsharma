<head>

<meta charset="utf-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1">

<title>
{{ if .IsHome }}
{{ .Site.Title }}
{{ else }}
{{ .Title }} · {{ .Site.Title }}
{{ end }}
</title>

<meta
    name="description"
    content="{{ .Site.Params.description }}">

{{ $style := resources.Get "css/styles.css" | resources.Minify | fingerprint }}

<link
    rel="stylesheet"
    href="{{ $style.RelPermalink }}">

</head>
