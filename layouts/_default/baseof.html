<!doctype html>
<html lang="en">

{{ partial "head.html" . }}

<body>
{{ with .Site.Params.analytics.gtm }}
<!-- Google Tag Manager (noscript) -->
<noscript>
    <iframe
        src="https://www.googletagmanager.com/ns.html?id={{ . }}"
        height="0"
        width="0"
        style="display:none;visibility:hidden">
    </iframe>
</noscript>
<!-- End Google Tag Manager (noscript) -->
 
{{ end }}
{{ partial "header.html" . }}

<main>
    {{ block "main" . }}{{ end }}
</main>

{{ partial "footer.html" . }}

</body>

</html>
